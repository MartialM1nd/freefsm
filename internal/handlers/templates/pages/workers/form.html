{{define "pages/workers/form.html"}}
<h1>{{.Title}}</h1>

{{if .Error}}
<p class="error">{{.Error}}</p>
{{end}}

<form method="POST" action="{{if .IsNew}}/workers{{else}}/workers/{{.Worker.ID}}{{end}}"
      hx-post="{{if .IsNew}}/workers{{else}}/workers/{{.Worker.ID}}{{end}}"
      hx-swap="none">
    {{if not .IsNew}}
    <input type="hidden" name="_method" value="PUT">
    {{end}}

    <label for="name">Name *</label>
    <input type="text" id="name" name="name" value="{{.Worker.Name}}" required>

    <div class="grid">
        <div>
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" value="{{.Worker.Email}}" required>
        </div>
        <div>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{.Worker.Phone}}">
        </div>
    </div>

    <label for="role">Role</label>
    <select id="role" name="role">
        <option value="technician" {{if eq .Worker.Role "technician"}}selected{{end}}>Technician</option>
        <option value="admin" {{if eq .Worker.Role "admin"}}selected{{end}}>Admin</option>
    </select>

    <label for="password">Password {{if .IsNew}}*{{else}}(leave blank to keep current){{end}}</label>
    <input type="password" id="password" name="password" {{if .IsNew}}required{{end}}>

    <div class="grid">
        <button type="submit">{{if .IsNew}}Create Worker{{else}}Save Changes{{end}}</button>
        <a href="/workers" role="button" class="secondary">Cancel</a>
    </div>
</form>
{{end}}
