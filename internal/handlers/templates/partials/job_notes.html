{{define "partials/job_notes.html"}}
{{if .Notes}}
<ul>
    {{range .Notes}}
    <li>
        <small>{{.User.Name}} - {{.CreatedAt.Format "Jan 2, 2006 3:04 PM"}}</small>
        <p>{{.Content}}</p>
    </li>
    {{end}}
</ul>
{{else}}
<p>No notes yet.</p>
{{end}}

<form hx-post="/jobs/{{if .Job}}{{.Job.ID}}{{else}}{{.JobID}}{{end}}/notes" hx-target="#job-notes" hx-swap="innerHTML">
    <textarea name="content" placeholder="Add a note..." rows="2" required></textarea>
    <button type="submit" class="secondary">Add Note</button>
</form>
{{end}}
