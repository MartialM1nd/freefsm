<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} - {{end}}FreeFSM</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/@alpinejs/collapse" defer></script>
    <script>
        // Set theme before page renders to prevent flash
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/alpine.min.js" defer></script>
</head>
<body x-data="sidebar()" @resize.window="onResize()">
    {{if .User}}
    <!-- Sidebar -->
    <aside 
        class="sidebar" 
        :class="{ 
            'sidebar-open': isOpen, 
            'sidebar-collapsed': isCollapsed
        }"
    >
        <!-- Sidebar hamburger (mobile only) -->
        <button class="sidebar-hamburger" @click="toggle()" x-show="isMobile">
            <i class="ph" :class="isOpen ? 'ph-x' : 'ph-list'"></i>
        </button>

        <nav class="sidebar-nav">
            <a href="/" class="nav-item" :class="{ 'active': '{{.Path}}' === '/' }">
                <i class="ph ph-gauge"></i>
                <span>Dashboard</span>
            </a>

            <a href="/customers" class="nav-item" :class="{ 'active': '{{.Path}}' === '/customers' }">
                <i class="ph ph-users-three"></i>
                <span>Customers</span>
            </a>

            <a href="/schedule" class="nav-item" :class="{ 'active': '{{.Path}}' === '/schedule' }">
                <i class="ph ph-calendar"></i>
                <span>Schedule</span>
            </a>

            <!-- Work Section (expandable) -->
            <div class="nav-section">
                <button 
                    class="nav-item nav-item-toggle" 
                    @click="toggleSection('work')"
                    :class="{ 'active': '{{.Path}}' === '/jobs' }"
                >
                    <i class="ph ph-briefcase"></i>
                    <span>Work</span>
                    <i class="ph" :class="sections.work ? 'ph-caret-up' : 'ph-caret-down'"></i>
                </button>
                <div class="nav-submenu" x-show="sections.work" x-collapse>
                    <a href="/jobs" class="nav-subitem">Work Orders</a>
                </div>
            </div>

            <!-- Sales Section (expandable) -->
            <div class="nav-section">
                <button 
                    class="nav-item nav-item-toggle" 
                    @click="toggleSection('sales')"
                >
                    <i class="ph ph-currency-dollar"></i>
                    <span>Sales</span>
                    <i class="ph" :class="sections.sales ? 'ph-caret-up' : 'ph-caret-down'"></i>
                </button>
                <div class="nav-submenu" x-show="sections.sales" x-collapse>
                    <a href="/quotes" class="nav-subitem">Quotes</a>
                    <a href="/invoices" class="nav-subitem">Invoices</a>
                </div>
            </div>

            <!-- Management Section (expandable) -->
            <div class="nav-section">
                <button 
                    class="nav-item nav-item-toggle" 
                    @click="toggleSection('management')"
                    :class="{ 'active': '{{.Path}}' === '/workers' }"
                >
                    <i class="ph ph-user-gear"></i>
                    <span>Management</span>
                    <i class="ph" :class="sections.management ? 'ph-caret-up' : 'ph-caret-down'"></i>
                </button>
                <div class="nav-submenu" x-show="sections.management" x-collapse>
                    <a href="/workers" class="nav-subitem">Team Members</a>
                </div>
            </div>

            <a href="/settings" class="nav-item" :class="{ 'active': '{{.Path}}' === '/settings' }">
                <i class="ph ph-gear"></i>
                <span>Settings</span>
            </a>
        </nav>

        <!-- Sidebar footer with collapse toggle -->
        <div class="sidebar-footer">
            <button class="nav-item" @click="toggleCollapse()" title="Toggle between icons and full width">
                <i class="ph" :class="isCollapsed ? 'ph-caret-right' : 'ph-caret-left'"></i>
                <span x-show="!isCollapsed">Collapse</span>
            </button>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div 
        class="sidebar-overlay" 
        x-show="isOpen && isMobile" 
        @click="isOpen = false"
    ></div>

    <!-- Main content -->
    <div 
        class="main-wrapper"
        :class="{ 
            'main-shift-collapsed': isCollapsed
        }"
    >
        <!-- Top Header Bar -->
        <header class="top-header">
            <div class="top-header-left">
                <a :href="currentPageUrl" class="header-page-link" x-text="currentPageName"></a>
            </div>
            <div class="top-header-right">
                <div 
                    x-data="{ 
                        theme: localStorage.getItem('theme') || 'light',
                        toggle() {
                            this.theme = this.theme === 'light' ? 'dark' : 'light';
                            localStorage.setItem('theme', this.theme);
                            document.documentElement.setAttribute('data-theme', this.theme);
                        }
                    }" 
                    @click="toggle()"
                    x-init="document.documentElement.setAttribute('data-theme', theme)"
                >
                    <button type="button" class="theme-toggle" x-text="theme === 'light' ? '☾' : '☀'" aria-label="Toggle theme"></button>
                </div>
                <div class="user-menu" x-data="{ open: false }">
                    <button class="user-menu-trigger" @click="open = !open" @click.outside="open = false">
                        <span>{{.User.Name}}</span>
                        <i class="ph ph-caret-down"></i>
                    </button>
                    <div class="user-dropdown" x-show="open" x-transition>
                        <a href="/settings" class="dropdown-item">
                            <i class="ph ph-user"></i>
                            Profile Settings
                        </a>
                        <form action="/logout" method="POST" class="dropdown-form">
                            <button type="submit" class="dropdown-item">
                                <i class="ph ph-sign-out"></i>
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            {{.Content}}
        </main>

        <footer class="container">
            <small>FreeFSM - Field Service Management</small>
        </footer>
    </div>

    <script>
        function sidebar() {
            return {
                isOpen: false,
                isCollapsed: false,
                isMobile: false,
                currentPageName: 'Dashboard',
                currentPageUrl: '/',
                sections: {
                    work: false,
                    sales: false,
                    management: false
                },
                
                init() {
                    this.onResize();
                    const path = '{{.Path}}';
                    this.updateCurrentPage(path);
                    if (path === '/jobs') {
                        this.sections.work = true;
                    } else if (path === '/workers') {
                        this.sections.management = true;
                    }
                },

                updateCurrentPage(path) {
                    const pages = {
                        '/': 'Dashboard',
                        '/customers': 'Customers',
                        '/schedule': 'Schedule',
                        '/jobs': 'Work Orders',
                        '/quotes': 'Quotes',
                        '/invoices': 'Invoices',
                        '/workers': 'Team Members',
                        '/settings': 'Settings'
                    };
                    this.currentPageName = pages[path] || 'Dashboard';
                    this.currentPageUrl = path === '/jobs' ? '/jobs' : (path === '/workers' ? '/workers' : path);
                },

                onResize() {
                    this.isMobile = window.innerWidth <= 768;
                    if (this.isMobile) {
                        this.isOpen = false;
                        this.isCollapsed = true;
                    } else {
                        this.isOpen = true;
                    }
                },

                toggle() {
                    this.isOpen = !this.isOpen;
                },

                toggleCollapse() {
                    this.isCollapsed = !this.isCollapsed;
                },

                toggleSection(name) {
                    this.sections[name] = !this.sections[name];
                }
            }
        }
    </script>
    {{end}}

    {{if not .User}}
    <main class="container">
        {{.Content}}
    </main>
    {{end}}
</body>
</html>
