{{define "pages/customers/form.html"}}
<h1>{{.Title}}</h1>

{{if .Error}}
<p class="error">{{.Error}}</p>
{{end}}

<form method="POST" action="{{if .IsNew}}/customers{{else}}/customers/{{.Customer.ID}}{{end}}"
      hx-post="{{if .IsNew}}/customers{{else}}/customers/{{.Customer.ID}}{{end}}"
      hx-swap="none">
    {{if not .IsNew}}
    <input type="hidden" name="_method" value="PUT">
    {{end}}

    <label for="name">Name *</label>
    <input type="text" id="name" name="name" value="{{.Customer.Name}}" required>

    <div class="grid">
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{.Customer.Email}}">
        </div>
        <div>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{.Customer.Phone}}">
        </div>
    </div>

    <label for="address">Address</label>
    <input type="text" id="address" name="address" value="{{.Customer.Address}}">

    <div class="grid">
        <div>
            <label for="city">City</label>
            <input type="text" id="city" name="city" value="{{.Customer.City}}">
        </div>
        <div>
            <label for="state">State</label>
            <input type="text" id="state" name="state" value="{{.Customer.State}}">
        </div>
        <div>
            <label for="zip">ZIP</label>
            <input type="text" id="zip" name="zip" value="{{.Customer.Zip}}">
        </div>
    </div>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="3">{{.Customer.Notes}}</textarea>

    <div class="grid">
        <button type="submit">{{if .IsNew}}Create Customer{{else}}Save Changes{{end}}</button>
        <a href="/customers" role="button" class="secondary">Cancel</a>
    </div>
</form>
{{end}}
